name: Process Data Only

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    paths:
      - 'process_nautica_data.py'  # Re-run when processor changes

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-process
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run processor
        run: python process_nautica_data.py

      - name: Run irradiation fetch
        run: python fetch_irradiation.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Process data ($(date -u '+%Y-%m-%d %H:%M') UTC)"
          git push
